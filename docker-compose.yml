services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - monitoring

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - monitoring

  carwebapi:
    build:
      context: ./CarWebAPI
      dockerfile: Dockerfile
    container_name: carwebapi
    ports:
      - "5219:5219"
    environment:
      - DOTNET_RUNNING_IN_CONTAINER=true
      - ASPNETCORE_ENVIRONMENT=Development
      - CarSelectionDatabase__ConnectionString=mongodb://mongodb:27017
      - CarSelectionDatabase__DatabaseName=CarSelection
      - CarSelectionDatabase__CarsCollectionName=Cars
      - RedisCacheOptions__Configuration=redis:6379
      - RedisCacheOptions__InstanceName=CarSelection_
      - Kafka__BootstrapServers=kafka:29092
    depends_on:
      - mongodb
      - redis
      - kafka
    networks:
      - monitoring


  userapi:
    build: 
      context: ./UserWebAPI
      dockerfile: Dockerfile
    container_name: userapi
    ports:
      - "5220:5220"
    environment:
      - DOTNET_RUNNING_IN_CONTAINER=true
      - ASPNETCORE_ENVIRONMENT=Development
      - UsersDatabase__ConnectionString=mongodb://mongodb:27017
      - UsersDatabase__DatabaseName=Users
      - UsersDatabase__UsersCollectionName=Users
      - RedisCacheOptions__Configuration=redis:6379
      - RedisCacheOptions__InstanceName=UserSelection_
      - Kafka__BootstrapServers=kafka:29092
    depends_on:
      - mongodb
      - redis
      - kafka
    networks:
      - monitoring


  mongodb:
    image: mongo:6.0
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - monitoring


  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - monitoring


  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - monitoring


  redis:
    image: redis:7.0
    container_name: redis
    ports:
      - "6379:6379"
    restart: always
    networks:
      - monitoring

networks:
  monitoring:
    driver: bridge

volumes:
  mongo_data:
  grafana_data: