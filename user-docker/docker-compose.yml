services:
  userapi:
    build: ../UserWebAPI
    ports:
      - "5220:5220"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    networks:
      - user-network

  mongodb:
    image: mongo:6.0
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - user-network

  prometheus:
    image: prom/prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - user-network

  grafana:
    image: grafana/grafana
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - user-network

networks:
  user-network:
    driver: bridge

volumes:
  mongo_data:  # ← ЭТО БЫЛО ПРОПУЩЕНО